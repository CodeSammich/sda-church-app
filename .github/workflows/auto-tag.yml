name: Release Auto-Tag
on:
  # ensure that workflows are run on various PR events
  pull_request:
    types: [opened, edited, synchronized, closed]
    branches:
      - main
  # ensure that subsequent commits on PR also trigger the workflow
  push:
    branches:
      - "release/**"

jobs:
  # Job 1: Ensures a version tag exists in the PR description
  enforce-tag:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - name: Resolve PR body
        id: pr_body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BODY=$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")
          else
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            PR_JSON=$(curl -sSL \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?head=${GITHUB_REPOSITORY_OWNER}:${BRANCH_NAME}&state=open")
            BODY=$(printf '%s' "$PR_JSON" | jq -r '.[0].body // ""')
            if [ -z "$BODY" ]; then
              echo "Validation Failed: no open pull request found for branch $BRANCH_NAME."
              exit 1
            fi
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for versioning tag
        env:
          PR_BODY: ${{ steps.pr_body.outputs.body }}
        run: |
          set -euo pipefail
          BODY="$PR_BODY"
          echo "PR body length: ${#BODY}"
          echo "--- PR body preview ---"
          printf '%s\n' "$BODY" | sed -n '1,12p'
          echo "--- end preview ---"
          count=0
          if printf '%s' "$BODY" | grep -Fq '#major'; then ((count++)); fi
          if printf '%s' "$BODY" | grep -Fq '#minor'; then ((count++)); fi
          if printf '%s' "$BODY" | grep -Fq '#patch'; then ((count++)); fi
          if [ "$count" -gt 1 ]; then
            echo "Validation Failed: Multiple version tags found in PR description. Please include only one of #major, #minor, or #patch." >&2
            exit 1
          fi
          if [ "$count" -eq 0 ]; then
            echo "Validation Failed: Please add #major, #minor, or #patch to the PR description." >&2
            exit 1
          fi
          echo "Validation Passed: One version tag found."

  # Job 2: Creates the tag ONLY on merge from a release/ branch
  tag:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true && 
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine bump type from PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          BODY="$PR_BODY"
          count=0
          bump=""
          if printf '%s' "$BODY" | grep -Fq '#major'; then ((count++)); bump="major"; fi
          if printf '%s' "$BODY" | grep -Fq '#minor'; then ((count++)); bump="minor"; fi
          if printf '%s' "$BODY" | grep -Fq '#patch'; then ((count++)); bump="patch"; fi
          if [ "$count" -gt 1 ]; then
            echo "Error: Multiple version tags found in PR body. Please include only one of #major, #minor, or #patch." >&2
            exit 1
          fi
          if [ "$count" -eq 0 ]; then
            echo "Error: No version tag found in PR body. Please include #major, #minor, or #patch." >&2
            exit 1
          fi
          echo "DEFAULT_BUMP=$bump" >> "$GITHUB_ENV"
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ env.DEFAULT_BUMP }}
